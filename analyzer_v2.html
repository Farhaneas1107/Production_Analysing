<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model V2 Analyzer | NAUE GMBH</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index_v4.css">
    <link rel="stylesheet" href="analyzer.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-image: none !important;
            background-color: #0d1117 !important; /* V1 dark mode */
        }
        .app-container {
            height: calc(100vh - 54px);
            padding: 16px;
            gap: 16px;
            margin-top: 54px;
        }
        .styled-input, select, input[type="text"] {
            background: rgba(1, 4, 9, 0.8) !important;
            color: #c9d1d9 !important;
            border-color: rgba(255, 255, 255, 0.08) !important;
            font-family: 'Inter', sans-serif !important;
        }
        .styled-input:focus { border-color: #58a6ff !important; box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.4) !important; }
        
        option { background: #010409 !important; color: #c9d1d9 !important; }
        
        .app-header { background-color: var(--naue-dark) !important; }
    </style>
</head>
<body>
    <header class="app-header" style="position: absolute; top: 0; left: 0; right: 0; z-index: 100;">
        <div class="header-left">
            <div class="logo-block" style="display:flex; align-items:center;">
                <svg width="32" height="32" viewBox="0 0 100 100" style="margin-right: 12px; flex-shrink: 0;">
                    <g fill="#30a271">
                        <path d="M 10 10 h 15 v 60 a 10 10 0 0 1 -10 10 h -5 v -70 z" />
                        <path d="M 90 10 h -15 v 70 h 5 a 10 10 0 0 0 10 -10 v -60 z" />
                        <path d="M 25 36 L 75 75 L 63 80 L 25 50 Z" />
                        <rect x="10" y="87" width="80" height="8" />
                    </g>
                </svg>
                <div>
                    <div class="logo-main"><span class="logo-naue">NAUE</span><span class="logo-gmbh">GMBH</span></div>
                    <div class="logo-sub">BUILDING ON SUSTAINABLE GROUND</div>
                </div>
            </div>
            <div class="header-divider"></div>
            <div class="header-context">
                MODEL V2 &bull; MICRO METRICS OVERLAY
            </div>
        </div>
        <div class="header-right">
            <div class="version-tag"><span>PRELIMINARY DESIGN</span></div>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="control-group">
                <label for="machineSelect">Select Machine</label>
                <div class="select-wrapper">
                    <select id="machineSelect">
                        <option value="">Loading...</option>
                    </select>
                </div>
            </div>

            <div class="control-group">
                <label class="section-title">TIME RANGE</label>
                
                <label class="sub-label">START</label>
                <div class="input-wrapper" style="margin-bottom: 12px;">
                    <input type="datetime-local" id="startDate" class="styled-input">
                </div>
                
                <label class="sub-label">END</label>
                <div class="input-wrapper">
                    <input type="datetime-local" id="endDate" class="styled-input">
                </div>

                <div style="display: flex; align-items: center; margin-top: 14px; gap: 12px;">
                    <label class="sub-label" style="margin: 0;">RESAMPLE</label>
                    <div class="select-wrapper" style="flex-grow: 1;">
                        <select id="resampleSelect" class="styled-input" style="font-family: var(--font);">
                            <option value="5">5 seconds</option>
                            <option value="15">15 seconds</option>
                            <option value="30">30 seconds</option>
                            <option value="60">1 minute</option>
                            <option value="300">5 minutes</option>
                            <option value="600" selected>10 minutes</option>
                            <option value="1800">30 minutes</option>
                            <option value="3600">1 hour</option>
                            <option value="10800">3 hours</option>
                            <option value="21600">6 hours</option>
                            <option value="43200">12 hours</option>
                            <option value="86400">1 day</option>
                            <option value="259200">3 days</option>
                            <option value="604800">7 days</option>
                            <option value="1296000">15 days</option>
                            <option value="2592000">30 days</option>
                            <option value="5184000">60 days</option>
                            <option value="7776000">90 days</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <label class="section-title">ANALYSIS ENGINE</label>
                <button id="runAnalysisBtn" class="btn primary" style="width: 100%; margin-top: 8px;">Detect Lags & Anomalies</button>
                <div id="analysisResult" style="margin-top: 12px; font-size: 0.75rem; color: var(--text-primary); display: none; background: rgba(88, 166, 255, 0.1); padding: 12px; border-radius: 4px; border: 1px solid var(--accent-glow); line-height: 1.5;"></div>
            </div>

            <div class="control-group" style="margin-bottom: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <label style="margin-bottom: 0;">Variables Overlay</label>
                    <button id="clearVarsBtn" class="btn secondary" style="padding: 4px 8px; font-size: 0.7rem;">Clear All</button>
                </div>
                <div class="search-box">
                    <input type="text" id="variableSearch" placeholder="Search variables...">
                </div>
                <div id="variablesList" class="variables-list custom-scrollbar">
                    <!-- Variable checkboxes injected here -->
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar glass-panel">
                <div class="stats-row">
                    <div class="stat-card">
                        <span class="stat-label">Total Records</span>
                        <h3 id="statRecords">0</h3>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Data Timeframe</span>
                        <h3 id="statDays">0 Days</h3>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Active Variables</span>
                        <h3 id="statVars">0</h3>
                    </div>
                </div>
                <div class="actions">
                    <button id="resetZoomBtn" class="btn primary">Reset Zoom</button>
                </div>
            </header>

            <section class="chart-section glass-panel">
                <div class="chart-header">
                    <h3>Correlational Timeseries Viewer</h3>
                    <p class="subtitle">Drag to zoom. Click legend to toggle individual traces.</p>
                </div>
                <div id="chartContainer" class="chart-container">
                    <!-- ECharts injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay active">
        <div class="spinner"></div>
        <p>Crunching Micro Metrics...</p>
    </div>

    <script>
        window.CHART_THEME = 'dark';
        lucide.createIcons();
    </script>
    <script src="analyzer.js"></script>
</body>
</html>
